name: OmniWeb CI/CD Pipeline

on:
  push:
    branches: [ "main", "release/**" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      build_env:
        description: 'Target environment build configuration'
        required: true
        default: 'production'
        type: choice
        options:
          - prototype
          - staging
          - production

permissions:
  contents: read

jobs:
  build_and_verify:
    name: Build & Verify (Android + Rust NDK)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          
      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.3.1'
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Generate Debug Keystore
        run: |
          set -euo pipefail
          if [ -f "debug.keystore.base64" ]; then
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "Warning: debug.keystore.base64 not found in repository."
          fi
        
      - name: Execute Deterministic Build & Lint
        run: |
          set -euo pipefail
          gradle assembleDebug lintDebug --stacktrace --no-daemon
