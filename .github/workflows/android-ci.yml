name: OmniWeb CI/CD Pipeline

on:
  push:
    branches: [ "main", "release/**" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      build_env:
        description: 'Target environment build configuration'
        required: true
        default: 'production'
        type: choice
        options:
          - prototype
          - staging
          - production

permissions:
  contents: read

jobs:
  build_and_verify:
    name: Build & Verify Omni-Tier
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          
      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Generate Debug Keystore
        run: |
          set -euo pipefail
          if [ -f "debug.keystore.base64" ]; then
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "Warning: debug.keystore.base64 not found in repository. Generating temporary debug.keystore..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Android Debug"
          fi
        
      - name: Check Code Quality (Lint)
        run: |
          set -euo pipefail
          gradle lintDebug --stacktrace --no-daemon
          
      - name: Run Unit Tests
        run: |
          set -euo pipefail
          gradle testDebugUnitTest --stacktrace --no-daemon
          
      - name: Assemble Debug APK
        run: |
          set -euo pipefail
          gradle assembleDebug --stacktrace --no-daemon
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/**/*.apk
          retention-days: 7
